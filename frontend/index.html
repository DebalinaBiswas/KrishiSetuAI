<!DOCTYPE html>
<html>
<head>
    <title>KrishiSetu AI</title>
    <style>
        body {
            font-family: Arial;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }

        textarea {
            width: 100%;
            height: 100px;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
        }

        #response {
            margin-top: 20px;
            white-space: pre-wrap;
            border: 1px solid #ddd;
            padding: 15px;
        }
    </style>
</head>
<body>

<h1>🌾 KrishiSetu AI</h1>

<textarea
    id="question"
    placeholder="Ask a farming question..."
></textarea>

<br>

<button onclick="askAI()">
    Get Advice
</button>

<div id="response"></div>

<script>
async function askAI() {

    const question =
        document.getElementById("question").value;

    const response = await fetch(
        "http://127.0.0.1:5000/chat",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                query: question
            })
        }
    );

    const data = await response.json();
        console.log(data);
    document.getElementById("response").innerText =
        JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
